<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <h1 class="logo">Github Finder</h1>
    <button class="btn">Favoris (<span id="bookmarkCount">0</span>)</button>
  </header>

  <main class="container">

    <!-- SEARCH BAR -->
    <div class="search-box">
      <input id="searchInput" type="text" placeholder="Ex: gaearon" />
      <button class="btn" id="searchBtn">Rechercher</button>
    </div>

    <!-- SECTION WELCOME -->
    <section class="card" id="welcomeSection">
      <h2>Bienvenue 👋</h2>
      <p>Écris un username GitHub pour afficher son profil.</p>
    </section>

    <!-- SECTION LOADING -->
    <section class="card hidden" id="loadingSection">
      <div class="loading">
        <div class="spinner"></div>
        <p id="loadingText">Chargement...</p>
      </div>
    </section>

    <!-- SECTION ERROR -->
    <section class="card card--error hidden" id="errorSection">
      <h2>Utilisateur introuvable</h2>
      <p>Le profil <strong id="errorText"></strong> n'existe pas sur GitHub.</p>
      <button class="btn btn--danger" id="retryBtn">Réessayer</button>
    </section>

    <!-- SECTION PROFILE -->
    <section class="profile-section hidden" id="profileSection">

      <div class="titles">
        <h2>Profil</h2>
        <h2 class="repo">Repositories</h2>
      </div>

      <div class="profile-container">
        <div id="userProfile"></div>
        <div id="reposList" class="repos"></div>
      </div>

    </section>

    <!-- SECTION BOOKMARKS -->
    <section class="card hidden" id="bookmarksSection">

      <div class="bookmarks-header">
        <h2>Mes Favoris (<span id="bookmarksTotalCount">0</span>)</h2>
        <button class="btn btn--outline" id="backBtn">Retour</button>
      </div>

      <div id="bookmarksList"></div>

    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
